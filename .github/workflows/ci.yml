name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (black + flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install linters
        run: pip install black==24.8.0 flake8==7.1.1

      - name: Check formatting (black)
        run: black --check --line-length 120 glue_jobs/ ingestion/ tests/

      - name: Check for lint errors (flake8)
        run: flake8 glue_jobs/ ingestion/ tests/

  # ── Job 2: Unit Tests ────────────────────────────────────────────────────────
  test:
    name: Unit Tests (pytest + PySpark)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      # PySpark requires Java. temurin 11 is stable with Spark 3.3.x.
      - uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: temurin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=glue_jobs \
            --cov-report=term-missing \
            --cov-fail-under=70

  # ── Job 3: Terraform Validate ────────────────────────────────────────────────
  terraform-check:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      # -backend=false skips the S3/DynamoDB state backend so validation works
      # without AWS credentials — we are only checking syntax and provider schemas.
      - name: Terraform Init (no backend)
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

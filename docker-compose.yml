services:
  test:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint:
      - python3
      - -m
      - pytest
      - tests/
      - -v
      - --tb=short
      - --cov=glue_jobs
      - --cov=scripts
      - --cov-report=term-missing
      - --cov-fail-under=70

  lint:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command: "black --check --line-length 120 glue_jobs/ ingestion/ tests/ && flake8 glue_jobs/ ingestion/ tests/"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

# monitor.py and notifier.py used to be omitted from coverage; they now have
# dedicated unit tests (tests/test_monitor.py, tests/test_notifier.py) and are
# measured like the rest of glue_jobs/.

[tool.black]
line-length = 120
skip-string-normalization = true

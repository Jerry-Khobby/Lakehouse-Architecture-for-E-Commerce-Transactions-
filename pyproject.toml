[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
omit = [
    "glue_jobs/utils/monitor.py",
    "glue_jobs/utils/notifier.py",
]

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
# E: pycodestyle errors | F: pyflakes | I: isort
select = ["E", "F", "I"]
ignore = [
    "E501",  # line too long — intentional in some Spark expressions
    "E402",  # module-level import not at top — conftest must mock before importing
    "E741",  # ambiguous variable name — 'l' etc. unlikely in this codebase
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "F811"]  # allow assert in tests; allow redefinition in fixtures
